<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shelterflex Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fff9f1;
        color: #1f2937;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      main {
        max-width: 28rem;
        padding: 2rem;
        border: 3px solid #111827;
        background: #ffffff;
        box-shadow: 8px 8px 0 #111827;
      }
      h1 {
        margin-top: 0;
      }
      p {
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>Shelterflex will keep showing cached pages and queue eligible actions until your connection returns.</p>
      <p>When you're back online, queued actions will sync automatically.</p>
    </main>
  </body>
</html>
